name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel superseded in-progress runs for the same ref.
concurrency:
  group: msbuild-${{ github.ref }}
  cancel-in-progress: true

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    # Single build of the solution. The unit tests below reuse its output: the wixext embeds the
    # wixlib produced here, and the C++ test project links the WiX native packages restored above.
    - name: Build
      run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} ${{ env.SOLUTION_FILE_PATH }}

    # SolutionDir is passed so the wixext PostBuild xcopy target resolves when the test project
    # builds the wixext outside of the .sln.
    - name: Run C# unit tests
      run: >
        dotnet test test/WixJsonFileExtension.Tests/WixJsonFileExtension.Tests.csproj
        --configuration ${{ env.BUILD_CONFIGURATION }}
        -p:SolutionDir=${{ github.workspace }}\

    - name: Build C++ unit tests
      run: msbuild /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 test\jsonca.tests\jsonca.tests.vcxproj

    - name: Run C++ unit tests
      shell: pwsh
      run: |
        $exe = Get-ChildItem -Path "test\jsonca.tests" -Filter "jsonca.tests.exe" -Recurse | Select-Object -First 1
        if (-not $exe) { Write-Error "jsonca.tests.exe not found"; exit 1 }
        Write-Host "Running $($exe.FullName)"
        & $exe.FullName
        if ($LASTEXITCODE -ne 0) { Write-Error "C++ unit tests failed with exit code $LASTEXITCODE"; exit 1 }

    - name: Pack
      working-directory: ${{ env.SOLUTION_FILE_PATH }}\src\wixext\
      run: dotnet pack --no-build --configuration ${{ env.BUILD_CONFIGURATION }} /p:Version=6.0.0.${{ github.run_number }}

    - name: Upload NuGet Package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ${{ env.SOLUTION_FILE_PATH }}\src\wixext\bin\${{ env.BUILD_CONFIGURATION }}\*.nupkg
