# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel superseded in-progress runs for the same ref.
concurrency:
  group: msbuild-${{ github.ref }}
  cancel-in-progress: true

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  BUILD_CONFIGURATION: Release

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    # Single build of the solution. The unit tests below reuse its output: the wixext embeds the
    # Build the custom action DLL for the non-x64 platforms first: the wixlib compiles its
    # x86/ARM64 fragments (and embeds those DLLs) only when the outputs exist.
    - name: Build x86 and ARM64 custom action DLLs
      run: |
        msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=Win32 /p:SolutionDir=${{ github.workspace }}\ src\ca\jsonca.vcxproj
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=ARM64 /p:SolutionDir=${{ github.workspace }}\ src\ca\jsonca.vcxproj

    # wixlib produced here, and the C++ test project links the WiX native packages restored above.
    - name: Build
      run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} ${{ env.SOLUTION_FILE_PATH }}

    # continue-on-error so both suites always run and produce result files; the reporter steps below
    # fail the job if there are test failures. SolutionDir is passed so the wixext PostBuild xcopy
    # target resolves when the test project builds the wixext outside of the .sln.
    - name: Run C# unit tests
      continue-on-error: true
      run: >
        dotnet test test/WixJsonFileExtension.Tests/WixJsonFileExtension.Tests.csproj
        --configuration ${{ env.BUILD_CONFIGURATION }}
        -p:SolutionDir=${{ github.workspace }}\
        --logger "trx;LogFileName=csharp-tests.trx"
        --results-directory ${{ github.workspace }}\TestResults

    - name: Build C++ unit tests
      run: msbuild /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 test\jsonca.tests\jsonca.tests.vcxproj

    - name: Run C++ unit tests
      continue-on-error: true
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path TestResults | Out-Null
        $exe = Get-ChildItem -Path "test\jsonca.tests" -Filter "jsonca.tests.exe" -Recurse | Select-Object -First 1
        if (-not $exe) { Write-Error "jsonca.tests.exe not found"; exit 1 }
        Write-Host "Running $($exe.FullName)"
        & $exe.FullName "$env:GITHUB_WORKSPACE\TestResults\cpp-tests.xml"
        Write-Host "C++ tests exit code: $LASTEXITCODE"

    - name: Publish C# test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: C# Unit Tests
        path: TestResults/csharp-tests.trx
        reporter: dotnet-trx

    - name: Publish C++ test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: C++ Unit Tests
        path: TestResults/cpp-tests.xml
        reporter: java-junit

    - name: Pack
      working-directory: ${{ env.SOLUTION_FILE_PATH }}\src\wixext\
      run: dotnet pack --no-build --configuration ${{ env.BUILD_CONFIGURATION }} /p:Version=6.0.0.${{ github.run_number }}

    - name: Upload NuGet Package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ${{ env.SOLUTION_FILE_PATH }}\src\wixext\bin\${{ env.BUILD_CONFIGURATION }}\*.nupkg
